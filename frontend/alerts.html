<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Monitor — Alerts</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <a class="brand" href="index.html">Pipeline Monitor</a>
    <a href="index.html">Dashboard</a>
    <a href="datasets.html">Datasets</a>
    <a href="pipelines.html">Pipelines</a>
    <a href="runs.html">Runs</a>
    <a href="alerts.html">Alerts</a>
</nav>

<div class="container">
    <h1>Alerts</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Severity</th>
                    <th>Status</th>
                    <th>Pipeline</th>
                    <th>Run</th>
                    <th>Message</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody id="tbody"><tr><td colspan="6" class="state-msg">Loading…</td></tr></tbody>
        </table>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin:32px 0 12px;">
        <h2 style="margin:0">Alert Rules</h2>
        <button class="btn btn-primary" onclick="showRuleForm()">+ New Rule</button>
    </div>

    <!-- Create alert rule form -->
    <div id="rule-form-wrap" style="display:none;background:#fff;border-radius:10px;padding:24px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
        <h3 style="margin-bottom:16px">New Alert Rule</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div>
                <label style="font-size:.8rem;color:#64748b;display:block;margin-bottom:4px">Rule name *</label>
                <input id="rf-name" type="text" placeholder="runtime-exceeded" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div>
                <label style="font-size:.8rem;color:#64748b;display:block;margin-bottom:4px">Pipeline *</label>
                <select id="rf-pipeline" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
                    <option value="">— select pipeline —</option>
                </select>
            </div>
            <div style="grid-column:1/-1">
                <label style="font-size:.8rem;color:#64748b;display:block;margin-bottom:4px">Condition *</label>
                <input id="rf-condition" type="text" placeholder="runtime > 10m" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
        </div>
        <div id="rule-form-error" style="color:#dc2626;font-size:.85rem;margin-top:8px;display:none;"></div>
        <div style="margin-top:16px;display:flex;gap:8px;">
            <button class="btn btn-success" onclick="submitRuleForm()">Create</button>
            <button class="btn" onclick="hideRuleForm()" style="background:#f1f5f9">Cancel</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Pipeline</th>
                    <th>Condition</th>
                    <th>Enabled</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="rules-tbody"><tr><td colspan="5" class="state-msg">Loading…</td></tr></tbody>
        </table>
    </div>
</div>

<script src="js/api.js"></script>
<script>
navActive();

async function loadAlerts() {
    const tbody = document.getElementById('tbody');
    try {
        const alerts = await API.getAlerts();
        if (!alerts.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="state-msg">No alerts.</td></tr>';
            return;
        }
        tbody.innerHTML = alerts.map(a => `
            <tr>
                <td><span class="badge badge-${a.severity}">${a.severity}</span></td>
                <td>${badge(a.status)}</td>
                <td>${a.pipeline_name || a.pipeline_id || '—'}</td>
                <td style="font-size:.78rem;color:#64748b;font-family:monospace">${a.run_id ? a.run_id.slice(0, 8) + '…' : '—'}</td>
                <td style="font-size:.85rem">${a.message}</td>
                <td>${fmtDate(a.created_at)}</td>
            </tr>
        `).join('');
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" class="state-msg error">Error: ${e.message}</td></tr>`;
    }
}

async function loadRules() {
    const tbody = document.getElementById('rules-tbody');
    try {
        const rules = await API.getAlertRules();
        if (!rules.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="state-msg">No alert rules.</td></tr>';
            return;
        }
        tbody.innerHTML = rules.map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.pipeline_name || r.pipeline_id}</td>
                <td><code style="font-size:.82rem">${r.condition}</code></td>
                <td>${badge(r.enabled ? 'active' : 'inactive')}</td>
                <td>
                    <button class="btn btn-sm" onclick="toggleRule('${r.id}', ${r.enabled})"
                        style="background:${r.enabled ? '#f1f5f9' : '#dcfce7'}">
                        ${r.enabled ? 'Disable' : 'Enable'}
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRule('${r.id}', '${r.name}')">Delete</button>
                </td>
            </tr>
        `).join('');
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" class="state-msg error">Error: ${e.message}</td></tr>`;
    }
}

async function toggleRule(id, currentEnabled) {
    try {
        await API.patchAlertRule(id, { enabled: !currentEnabled });
        loadRules();
    } catch (e) {
        alert(`Error: ${e.message}`);
    }
}

async function deleteRule(id, name) {
    if (!confirm(`Delete alert rule "${name}"?`)) return;
    try {
        await API.deleteAlertRule(id);
        loadRules();
    } catch (e) {
        alert(`Error: ${e.message}`);
    }
}

async function showRuleForm() {
    document.getElementById('rule-form-wrap').style.display = 'block';
    const sel = document.getElementById('rf-pipeline');
    if (sel.options.length <= 1) {
        try {
            const pipelines = await API.getPipelines();
            pipelines.forEach(p => {
                const o = document.createElement('option');
                o.value = p.id;
                o.textContent = p.name;
                sel.appendChild(o);
            });
        } catch {}
    }
}

function hideRuleForm() {
    document.getElementById('rule-form-wrap').style.display = 'none';
    document.getElementById('rule-form-error').style.display = 'none';
}

async function submitRuleForm() {
    const errEl = document.getElementById('rule-form-error');
    errEl.style.display = 'none';
    try {
        await API.createAlertRule({
            name: document.getElementById('rf-name').value.trim(),
            pipeline_id: document.getElementById('rf-pipeline').value,
            condition: document.getElementById('rf-condition').value.trim(),
        });
        hideRuleForm();
        loadRules();
    } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
    }
}

loadAlerts();
loadRules();
setInterval(() => { loadAlerts(); loadRules(); }, 15000);
</script>
</body>
</html>
